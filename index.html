<!DOCTYPE html>
<html>
<head>
    <title>My Proxy Portal</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding: 20px; }
        button { background: #1a1a1a; border: 1px solid #444; color: white; padding: 15px; cursor: pointer; }
        iframe { width: 100%; height: 80vh; border: none; }
    </style>
</head>
<body>
    <div class="grid" id="game-list">
        </div>
    <iframe id="main-frame"></iframe>
    <script>
        const games = [
            {name: "Slope", url: "https://games-3kh0.github.io/3kh0-assets/slope/"},
            {name: "2048", url: "https://games-3kh0.github.io/3kh0-assets/2048/"},
            // You can paste 1000s of these here
        ];
        const grid = document.getElementById('game-list');
        games.forEach(g => {
            let btn = document.createElement('button');
            btn.innerText = g.name;
            btn.onclick = () => document.getElementById('main-frame').src = g.url;
            grid.appendChild(btn);
        });
    </script>
</body>
</html>
